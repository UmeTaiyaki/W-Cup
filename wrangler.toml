name = "wcup2026-yosou"
pages_build_output_dir = "public"
compatibility_date = "2026-01-01"

# 公開設定（バージョン管理してよい値のみ）。秘密値は wrangler pages secret put で別管理。
# RESEND_API_KEY / ADMIN_EMAIL は secret（コードに含めない）。
[vars]
TURNSTILE_SITE_KEY = "0x4AAAAAADfpjorHdMgnGDQ_"
# 観戦機能のフィーチャーフラグ。true で /api/live が sm_* を配信（OFFなら enabled:false＝既存挙動）。
WATCH_ENABLED = "true"
# 試合前ご当地応援バトルのフィーチャーフラグ。true で /api/cheer が稼働（OFFなら enabled:false＝UI非表示）。
CHEER_ENABLED = "true"
# 試合ハイライト（YouTube）のフィーチャーフラグ。true で /api/fixture が highlight を返す
# （OFF/未設定なら highlight:null＝タブにデータが出ない安全側）。要 sm_highlights テーブル(db/schema-watch.sql)。
HIGHLIGHTS_ENABLED = "true"
# PMSR（FIFA公式マッチレポート）のフィーチャーフラグ。true で /api/fixture が pmsr を返す
# （OFF/未設定なら pmsr:null＝タブにデータが出ない安全側）。要 sm_pmsr テーブル(db/0014_sm_pmsr.sql)＋R2バケット。
PMSR_ENABLED = "true"
# 永続データ(user/room/config)の読み取り元バックエンド。KV→D1 無停止移行の切替フラグ。
#   未設定/"kv" = 二重書き込み・読みは KV（移行 段1）/ "d1" = 二重書き込み・読みは D1（段3）
#   "d1-only"   = D1 単独・KV 書き込み停止（段4）
# DB バインドが無ければ常に KV 単独（このフラグは無視される）。詳細は
# docs/superpowers/plans/2026-06-08-kv-to-d1-migration.md。
STORE_READ_BACKEND = "d1-only"
# ホームのニュースカルーセル（GNews lang=ja）のフィーチャーフラグ。true で /api/news が稼働
# （OFF/失敗/空は items:[]＝カルーセル非表示＝既存ホームと同一）。要 secret GNEWS_API_KEY。
NEWS_ENABLED = "true"
GNEWS_QUERY = "\"ワールドカップ\" OR \"W杯\""
GNEWS_LANG = "ja"
# OTPメールの差出人。Resend のDNS(SPF/DKIM)検証が完了してから下行のコメントを外す。
# 未検証の間はコメントのままにし、email.js 既定の onboarding@resend.dev で送る
# （Resend に umetaiyaki@umetaiyaki.com で登録すれば、検証前でも自分宛に送れる）。
# OTP_FROM_EMAIL = "W杯2026予想 <noreply@umetaiyaki.com>"

[[kv_namespaces]]
binding = "CONFIG"
id = "8c9c431e2ee146a5a8ebafed58758a45"          # 本番KV（wrangler pages deploy / production）
# 下は `wrangler pages dev`（ローカル開発）でのみ使われるテストKV。
# クラウドのプレビューデプロイで分けるにはダッシュボードの Preview バインディング設定が必要。
preview_id = "f020e592e7c5484082229c56f653c465"

# 永続データ移行先の D1（APAC）。binding=DB は getStore(env) が参照する名前。
# スキーマは db/schema.sql。ローカル開発(wrangler pages dev)は同名のローカル D1 を自動使用。
[[d1_databases]]
binding = "DB"
database_name = "wcup2026-db"
database_id = "a149694b-686c-45a4-9130-01969cccd82a"

# PMSR の図表PNG置き場（R2）。binding=PMSR_FIGS を /api/pmsr-figure が参照しstream配信。
# バケット作成: wrangler r2 bucket create wcup2026-pmsr（作成済み 2026-06-17）。
[[r2_buckets]]
binding = "PMSR_FIGS"
bucket_name = "wcup2026-pmsr"
