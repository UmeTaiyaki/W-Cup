  <script>
    // この HTML が読み込まれた時点のビルド識別子。デプロイ時に Actions が git SHA へ置換する
    // （未置換のローカル開発時はそのまま＝更新チェックは無効）。version.json と照合して更新検知する。
    window.__APP_VERSION = '__BUILD_VERSION__';

    // PWA: beforeinstallprompt は読み込み直後（AccountScreen マウント前）に発火しうるため、
    // ここで早期に捕捉して保持する。Android/PC のみ発火（iOS は未サポート）。
    window.__wcInstall = { prompt: null };
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.__wcInstall.prompt = e;
      window.dispatchEvent(new Event('wc-installable'));
    });
    window.addEventListener('appinstalled', function () {
      window.__wcInstall.prompt = null;
      window.dispatchEvent(new Event('wc-installed'));
    });
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "pitch",
      "accent": "#B6FF3C",
      "showWordmark": true,
      "dtLayout": "split",
      "preview": "auto"
    }/*EDITMODE-END*/;

    const ACCENTS = {
      pitch:   ['#B6FF3C', '#3CE0FF', '#FFD23D', '#FF6B6B'],
      classic: ['#1E50E6', '#0F9D58', '#E4572E', '#7A3FF2'],
      bold:    ['#FF3D8B', '#21E6C1', '#FFD23D', '#7C5Cff'],
    };

    // テーマ合成（base ＋ アクセント上書き）
    function useTheme(t) {
      const base = window.WC.THEMES[t.theme] || window.WC.THEMES.pitch;
      const T = { ...base };
      if (t.accent) {
        T.accent = t.accent;
        const hex = t.accent.replace('#', '');
        const r = parseInt(hex.slice(0, 2), 16), g = parseInt(hex.slice(2, 4), 16), b = parseInt(hex.slice(4, 6), 16);
        T.accentInk = (r * 0.299 + g * 0.587 + b * 0.114) > 150 ? '#0A1410' : '#ffffff';
      }
      return T;
    }

    // ロード中プレースホルダ
    function Splash({ T }) {
      return (
        <div style={{ height: '100%', display: 'grid', placeItems: 'center', background: T.bg, position: 'relative' }}>
          <div style={{ position: 'absolute', inset: 0, background: T.grad, pointerEvents: 'none' }} />
          <div style={{ position: 'relative', textAlign: 'center' }}>
            <div style={{ width: 48, height: 48, borderRadius: 14, background: T.accent,
              display: 'grid', placeItems: 'center', margin: '0 auto 14px' }}>
              <Icon name="trophy" size={28} color={T.accentInk} />
            </div>
            <div style={{ color: T.sub, fontSize: 14, fontWeight: 700 }}>読み込み中…</div>
          </div>
        </div>
      );
    }

    // 画像をブラウザ側で縮小・JPEG 再エンコード（Discord 8MB 制限内に収める）。失敗時は原本を返す。
    async function compressImage(file, opts) {
      const maxEdge = (opts && opts.maxEdge) || 1600;
      const quality = (opts && opts.quality) || 0.8;
      if (!file || !String(file.type || '').startsWith('image/')) return file;
      try {
        const bitmap = await createImageBitmap(file);
        const scale = Math.min(1, maxEdge / Math.max(bitmap.width, bitmap.height));
        const w = Math.max(1, Math.round(bitmap.width * scale));
        const h = Math.max(1, Math.round(bitmap.height * scale));
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', quality));
        if (!blob) return file;
        return new File([blob], 'feedback.jpg', { type: 'image/jpeg' });
      } catch (e) {
        return file; // 圧縮できなくてもサーバ側上限で弾けるので原本で続行
      }
    }

    // フィードバックフォーム（本文必須＋画像任意1枚＋Turnstile）。
    function FeedbackForm({ T, siteKey, onClose }) {
      const [text, setText] = useState('');
      const [imageFile, setImageFile] = useState(null);
      const [preview, setPreview] = useState(null);
      const [token, setToken] = useState(null);
      const [tsKey, setTsKey] = useState(0);
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState('');
      const [done, setDone] = useState(false);
      const previewRef = useRef(preview);
      previewRef.current = preview;
      useEffect(() => () => { if (previewRef.current) URL.revokeObjectURL(previewRef.current); }, []);
      const MAX = 1000;
      const remain = MAX - Array.from(text).length;

      async function pickImage(e) {
        const f = e.target.files && e.target.files[0];
        e.target.value = '';
        if (!f) return;
        if (!String(f.type || '').startsWith('image/')) { setErr('画像ファイルを選んでください'); return; }
        setErr('');
        const compressed = await compressImage(f);
        if (preview) URL.revokeObjectURL(preview);
        setImageFile(compressed);
        setPreview(URL.createObjectURL(compressed));
      }
      function removeImage() {
        if (preview) URL.revokeObjectURL(preview);
        setImageFile(null); setPreview(null);
      }
      async function submit() {
        const t = text.trim();
        if (!t || busy) return;
        if (siteKey && !token) { setErr('「私はロボットではありません」の確認を完了してください'); return; }
        setBusy(true); setErr('');
        try {
          await window.WC.Feedback.send({ text: t, imageFile, turnstileToken: token });
          if (preview) URL.revokeObjectURL(preview);
          setDone(true);
        } catch (e) {
          setErr(e.message || '送信に失敗しました');
          if (siteKey) { setToken(null); setTsKey((k) => k + 1); }
        } finally { setBusy(false); }
      }

      if (done) {
        return (
          <div style={{ background: T.card, borderRadius: 16, padding: '16px', marginTop: 10,
            boxShadow: `inset 0 0 0 1px ${T.line}` }}>
            <div style={{ fontWeight: 800, color: T.text, fontSize: 14.5, marginBottom: 4 }}>
              送信しました。ありがとうございます</div>
            <p style={{ color: T.sub, fontSize: 12.5, lineHeight: 1.5, margin: '0 0 12px' }}>
              いただいた内容は運営が確認します。</p>
            <button onClick={onClose} style={{
              border: 'none', borderRadius: 12, padding: '10px 16px', cursor: 'pointer',
              background: T.panel2, color: T.sub, fontFamily: 'inherit', fontWeight: 800, fontSize: 13.5 }}>
              閉じる</button>
          </div>
        );
      }

      return (
        <div style={{ background: T.card, borderRadius: 16, padding: '16px', marginTop: 10,
          boxShadow: `inset 0 0 0 1px ${T.line}`, display: 'flex', flexDirection: 'column', gap: 10 }}>
          <textarea value={text} maxLength={MAX} rows={4}
            onChange={(e) => setText(e.target.value)}
            placeholder="ご意見・不具合など、なんでもどうぞ"
            style={{ width: '100%', boxSizing: 'border-box', border: 'none', outline: 'none',
              resize: 'vertical', background: T.panel2, color: T.text, fontSize: 15, fontFamily: 'inherit',
              fontWeight: 600, lineHeight: 1.6, padding: '12px 14px', borderRadius: 12 }} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <label style={{ display: 'inline-flex', alignItems: 'center', gap: 6, cursor: 'pointer',
              background: T.panel2, color: T.sub, borderRadius: 12, padding: '9px 13px',
              fontWeight: 800, fontSize: 13 }}>
              <Icon name="image" size={15} color={T.sub} sw={2.2} />
              {imageFile ? '画像を変更' : '画像を添付'}
              <input type="file" accept="image/*" onChange={pickImage} style={{ display: 'none' }} />
            </label>
            <span style={{ marginLeft: 'auto', fontSize: 12, fontWeight: 700,
              color: remain < 0 ? '#FF6B6B' : T.faint }}>{remain}</span>
          </div>
          {preview ? (
            <div style={{ position: 'relative', alignSelf: 'flex-start' }}>
              <img src={preview} alt="添付画像" style={{ maxWidth: '100%', maxHeight: 200,
                borderRadius: 12, display: 'block' }} />
              <button onClick={removeImage} title="削除" style={{ position: 'absolute', top: 6, right: 6,
                border: 'none', borderRadius: 999, width: 28, height: 28, cursor: 'pointer',
                background: 'rgba(0,0,0,0.6)', color: '#fff', fontWeight: 900, fontSize: 14 }}>×</button>
            </div>
          ) : null}
          {siteKey ? (
            <TurnstileWidget key={tsKey} siteKey={siteKey} onToken={setToken}
              theme={T.isDark === false ? 'light' : 'dark'} />
          ) : null}
          {err ? <div style={{ color: '#FF6B6B', fontSize: 12.5, fontWeight: 700 }}>{err}</div> : null}
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={onClose} style={{
              border: 'none', borderRadius: 12, padding: '11px 16px', cursor: 'pointer',
              background: T.panel2, color: T.sub, fontFamily: 'inherit', fontWeight: 800, fontSize: 13.5 }}>
              キャンセル</button>
            <button onClick={submit} disabled={!text.trim() || busy} style={{
              flex: 1, border: 'none', borderRadius: 12, padding: '11px 18px',
              cursor: !text.trim() || busy ? 'default' : 'pointer',
              background: !text.trim() || busy ? T.panel2 : T.accent,
              color: !text.trim() || busy ? T.faint : T.accentInk,
              fontFamily: 'inherit', fontWeight: 800, fontSize: 13.5 }}>
              {busy ? '送信中…' : '送信する'}</button>
          </div>
        </div>
      );
    }

    // デプロイ更新の検知。起動時とフォアグラウンド復帰時に version.json を確認し、
    // 読み込み済みバージョンと異なれば stale=true（更新バナーを出す）。
    // PWA standalone は手動リロード手段が無いため、ユーザーが1タップで最新化できるようにする。
    function useAppUpdate() {
      const loaded = window.__APP_VERSION || '';
      const [stale, setStale] = useState(false);
      useEffect(() => {
        const placeholder = '__BUILD' + '_VERSION__'; // sed 置換に巻き込まれないよう分割表記
        if (!loaded || loaded === placeholder) return; // ローカル開発（SHA 未注入）は無効
        let alive = true;
        async function check() {
          try {
            const res = await fetch('/version.json', { cache: 'no-store' });
            if (!res.ok) return;
            const data = await res.json();
            if (alive && data && data.version && data.version !== loaded) setStale(true);
          } catch (e) {}
        }
        check();
        const onVis = () => { if (document.visibilityState === 'visible') check(); };
        document.addEventListener('visibilitychange', onVis);
        return () => { alive = false; document.removeEventListener('visibilitychange', onVis); };
      }, [loaded]);
      return stale;
    }

    // PWA インストール状態。Android/PC はネイティブプロンプト、iOS は手順案内になる。
    // standalone 起動中（インストール済み）は installed=true でボタンを隠す。
    function usePwaInstall() {
      const standalone = () =>
        (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
        window.navigator.standalone === true;
      const [installed, setInstalled] = useState(standalone);
      const [canPrompt, setCanPrompt] = useState(() => !!(window.__wcInstall && window.__wcInstall.prompt));
      useEffect(() => {
        const onAvail = () => setCanPrompt(true);
        const onDone = () => { setCanPrompt(false); setInstalled(true); };
        window.addEventListener('wc-installable', onAvail);
        window.addEventListener('wc-installed', onDone);
        return () => {
          window.removeEventListener('wc-installable', onAvail);
          window.removeEventListener('wc-installed', onDone);
        };
      }, []);
      const ua = window.navigator.userAgent || '';
      const isIOS = /iphone|ipad|ipod/i.test(ua) ||
        (window.navigator.platform === 'MacIntel' && window.navigator.maxTouchPoints > 1); // iPadOS13+
      async function promptInstall() {
        const dp = window.__wcInstall && window.__wcInstall.prompt;
        if (!dp) return;
        dp.prompt();
        try { await dp.userChoice; } catch (e) {}
        window.__wcInstall.prompt = null;
        setCanPrompt(false);
      }
      return { installed, canPrompt, isIOS, promptInstall };
    }

    // アカウント画面（名前変更＋同期コード再表示＋このブラウザのデータ削除）
    function AccountScreen({ T, me, setMe, onSignOut, siteKey }) {
      const pwa = usePwaInstall();
      const [showIosGuide, setShowIosGuide] = useState(false);
      const [copied, setCopied] = useState(false);
      const [confirm, setConfirm] = useState(false);
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(me.name || '');
      const [saving, setSaving] = useState(false);
      const [nameErr, setNameErr] = useState('');
      const [showFeedback, setShowFeedback] = useState(false);
      const fmt = (c) => (c || '').replace(/(.{4})(?=.)/g, '$1-');
      function copy() {
        try { navigator.clipboard.writeText(me.code); setCopied(true); setTimeout(() => setCopied(false), 1600); }
        catch (e) {}
      }
      function startEdit() { setDraft(me.name || ''); setNameErr(''); setEditing(true); }
      function cancelEdit() { setEditing(false); setNameErr(''); }
      async function saveName() {
        const nm = draft.trim();
        if (!nm || saving) return;
        if (nm === me.name) { setEditing(false); return; }
        setSaving(true); setNameErr('');
        try {
          const u = await window.WC.Me.setName(nm);
          setMe({ ...me, name: u.name, updatedAt: u.updatedAt });
          setEditing(false);
        } catch (e) {
          setNameErr(e && e.message ? e.message : '変更に失敗しました');
        } finally { setSaving(false); }
      }
      const avatar = { c: T.accent, initial: Array.from(me.name || '?')[0] || '?' };
      return (
        <div style={{ padding: '4px 16px 24px', display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div>
            <Eyebrow T={T}>アカウント</Eyebrow>
            {!editing ? (
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 8 }}>
                <Avatar m={avatar} size={44} T={T} />
                <div style={{ flex: 1, minWidth: 0, fontSize: 23, fontWeight: 800, color: T.text,
                  overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{me.name}</div>
                <button onClick={startEdit} style={{
                  border: 'none', borderRadius: 12, padding: '9px 14px', cursor: 'pointer',
                  background: `${T.accent}1A`, color: T.accent, fontFamily: 'inherit',
                  fontWeight: 800, fontSize: 13.5, display: 'flex', alignItems: 'center', gap: 6 }}>
                  <Icon name="edit" size={15} color={T.accent} sw={2.2} />名前を変更</button>
              </div>
            ) : (
              <div style={{ marginTop: 8 }}>
                <input autoFocus value={draft} maxLength={10}
                  onChange={(e) => setDraft(e.target.value)}
                  onKeyDown={(e) => { if (e.key === 'Enter') saveName(); if (e.key === 'Escape') cancelEdit(); }}
                  placeholder="ニックネーム（10文字まで）"
                  style={{ width: '100%', boxSizing: 'border-box', border: 'none', outline: 'none',
                    background: T.panel2, color: T.text, fontSize: 18, fontFamily: 'inherit',
                    fontWeight: 800, padding: '13px 14px', borderRadius: 14,
                    boxShadow: `inset 0 0 0 1.5px ${T.accent}` }} />
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 10 }}>
                  <span style={{ flex: 1, fontSize: 12, color: nameErr ? '#FF6B6B' : T.faint, fontWeight: 700 }}>
                    {nameErr || `${Array.from(draft.trim()).length} / 8 文字`}</span>
                  <button onClick={cancelEdit} style={{
                    border: 'none', borderRadius: 12, padding: '10px 16px', cursor: 'pointer',
                    background: T.panel2, color: T.sub, fontFamily: 'inherit', fontWeight: 800, fontSize: 13.5 }}>
                    キャンセル</button>
                  <button onClick={saveName} disabled={!draft.trim() || saving} style={{
                    border: 'none', borderRadius: 12, padding: '10px 18px',
                    cursor: !draft.trim() || saving ? 'default' : 'pointer',
                    background: !draft.trim() || saving ? T.panel2 : T.accent,
                    color: !draft.trim() || saving ? T.faint : T.accentInk,
                    fontFamily: 'inherit', fontWeight: 800, fontSize: 13.5 }}>
                    {saving ? '…' : '保存'}</button>
                </div>
              </div>
            )}
          </div>

          {/* 同期コード */}
          <div style={{ background: T.card, borderRadius: 18, padding: 18, boxShadow: `inset 0 0 0 1px ${T.line}` }}>
            <Eyebrow T={T}>同期コード</Eyebrow>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 10 }}>
              <div style={{ flex: 1, fontFamily: 'Archivo, monospace', fontWeight: 900, fontSize: 24,
                letterSpacing: 3, color: T.text }}>{fmt(me.code)}</div>
              <button onClick={copy} style={{
                border: 'none', borderRadius: 12, padding: '10px 14px', cursor: 'pointer',
                background: copied ? T.card : `${T.accent}1A`, color: T.accent, fontFamily: 'inherit',
                fontWeight: 800, fontSize: 13.5, display: 'flex', alignItems: 'center', gap: 6,
                boxShadow: copied ? `inset 0 0 0 1.5px ${T.accent}` : 'none' }}>
                <Icon name={copied ? 'check' : 'copy'} size={16} color={T.accent} sw={2.4} />
                {copied ? 'コピー済' : 'コピー'}</button>
            </div>
            <p style={{ color: T.faint, fontSize: 12, lineHeight: 1.6, margin: '12px 0 0' }}>
              別の端末で予想を続けるときに使います。<br />
              <b style={{ color: T.sub }}>無くすと復元できません</b>ので大切に保管してください。</p>
          </div>

          {/* アプリとして使う（PWA インストール）。Android/PC はネイティブ、iOS は手順案内。 */}
          {!pwa.installed && (pwa.canPrompt || pwa.isIOS) && (
            <div>
              <Eyebrow T={T}>アプリとして使う</Eyebrow>
              <button onClick={() => { if (pwa.canPrompt) pwa.promptInstall(); else setShowIosGuide(true); }} style={{
                width: '100%', marginTop: 8, border: 'none', borderRadius: 14, padding: '13px',
                fontFamily: 'inherit', fontWeight: 800, fontSize: 14, cursor: 'pointer',
                background: `${T.accent}1A`, color: T.accent,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                <Icon name="plus" size={17} color={T.accent} sw={2.4} />
                ホーム画面に追加</button>
              <p style={{ color: T.faint, fontSize: 12, lineHeight: 1.6, margin: '8px 0 0' }}>
                ホームからアプリのように全画面で起動できます。</p>
            </div>
          )}

          {/* フィードバック */}
          <div>
            <Eyebrow T={T}>フィードバック</Eyebrow>
            {!showFeedback ? (
              <button onClick={() => setShowFeedback(true)} style={{
                width: '100%', marginTop: 8, border: 'none', borderRadius: 14, padding: '13px',
                fontFamily: 'inherit', fontWeight: 800, fontSize: 14, cursor: 'pointer',
                background: T.card, color: T.text, boxShadow: `inset 0 0 0 1px ${T.line}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                <Icon name="chat" size={17} color={T.accent} sw={2.2} />
                フィードバックを送る</button>
            ) : (
              <FeedbackForm T={T} siteKey={siteKey} onClose={() => setShowFeedback(false)} />
            )}
          </div>

          {/* このブラウザからサインアウト */}
          <div style={{ marginTop: 4, paddingTop: 16, borderTop: `1px solid ${T.line}` }}>
            {!confirm ? (
              <button onClick={() => setConfirm(true)} style={{
                width: '100%', border: 'none', borderRadius: 14, padding: '13px',
                fontFamily: 'inherit', fontWeight: 800, fontSize: 14.5, cursor: 'pointer',
                background: 'transparent', color: '#FF6B6B', boxShadow: `inset 0 0 0 1.5px #FF6B6B44`,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                <Icon name="door" size={17} color="#FF6B6B" />
                このブラウザからサインアウト</button>
            ) : (
              <div style={{ background: T.card, borderRadius: 16, padding: '14px 16px',
                boxShadow: `inset 0 0 0 1px #FF6B6B44` }}>
                <div style={{ fontWeight: 800, color: T.text, fontSize: 14.5, marginBottom: 3 }}>
                  サインアウトしますか？</div>
                <p style={{ color: T.sub, fontSize: 12.5, lineHeight: 1.5, margin: '0 0 12px' }}>
                  この端末の予想表示が消えます。<br /><b style={{ color: T.text }}>同期コード {fmt(me.code)}</b> を控えておけば、いつでも復元できます。</p>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button onClick={() => setConfirm(false)} style={{
                    flex: 1, border: 'none', borderRadius: 12, padding: '11px', fontFamily: 'inherit',
                    fontWeight: 800, fontSize: 14, cursor: 'pointer', background: T.panel2, color: T.sub }}>
                    キャンセル</button>
                  <button onClick={onSignOut} style={{
                    flex: 1, border: 'none', borderRadius: 12, padding: '11px', fontFamily: 'inherit',
                    fontWeight: 800, fontSize: 14, cursor: 'pointer', background: '#FF6B6B', color: '#fff' }}>
                    サインアウト</button>
                </div>
              </div>
            )}
          </div>

          {/* iOS 用「ホーム画面に追加」手順（iOS は beforeinstallprompt 非対応のため案内のみ） */}
          {showIosGuide && (
            <div onClick={() => setShowIosGuide(false)} style={{ position: 'fixed', inset: 0, zIndex: 1300,
              background: 'rgba(0,0,0,0.55)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
              <div onClick={(e) => e.stopPropagation()} style={{ width: '100%', maxWidth: 380, background: T.bg,
                borderRadius: 20, padding: '22px 20px', boxShadow: '0 20px 60px rgba(0,0,0,0.5)' }}>
                <div style={{ width: 44, height: 44, borderRadius: 13, background: `${T.accent}1F`,
                  display: 'grid', placeItems: 'center', marginBottom: 14 }}>
                  <Icon name="plus" size={24} color={T.accent} />
                </div>
                <div style={{ fontWeight: 800, color: T.text, fontSize: 18 }}>ホーム画面に追加</div>
                <p style={{ color: T.sub, fontSize: 13.5, lineHeight: 1.7, margin: '10px 0 0' }}>
                  Safari 下部の<b style={{ color: T.text }}>共有ボタン（□に↑のマーク）</b>をタップし、
                  メニューを下にスクロールして<b style={{ color: T.text }}>「ホーム画面に追加」</b>を選んでください。
                  🏆 アイコンが追加され、全画面アプリとして起動できます。</p>
                <button onClick={() => setShowIosGuide(false)} style={{
                  width: '100%', marginTop: 18, border: 'none', borderRadius: 13, padding: '13px',
                  fontFamily: 'inherit', fontWeight: 800, fontSize: 14.5, cursor: 'pointer',
                  background: T.accent, color: T.accentInk }}>わかった</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ================= ホーム（単一ユーザー） =================
    function Home({ T, t, setTweak, me, setMe, isDesktop, contW, mode, onSignOut, initialTab, siteKey }) {
      const [tab, setTab] = useState(initialTab || 'summary'); // summary | input | rooms | group | account
      const [optScreen, setOptScreen] = useState(null);  // grouprank | thirdwild | knockout | null
      // 見比べ中の部屋。初期値は「最後に開いた部屋」（localStorage、me.rooms に存在する場合）
      const LAST_ROOM_KEY = 'wc2026_last_room_v1';
      const [roomView, setRoomView] = useState(() => {
        try {
          const last = localStorage.getItem(LAST_ROOM_KEY);
          const rooms = me.rooms || [];
          return last ? (rooms.find((r) => r.id === last) || null) : null;
        } catch (e) { return null; }
      });
      function openRoom(r) {
        try { localStorage.setItem(LAST_ROOM_KEY, r.id); } catch (e) {}
        setRoomView(r);
      }

      // ヘッダーの更新ボタンで最新データを再取得（プル更新は廃止）。
      const [roomRefreshKey, setRoomRefreshKey] = useState(0);
      const [refreshing, setRefreshing] = useState(false);
      async function doRefresh() {
        if (refreshing) return;
        setRefreshing(true);
        setRoomRefreshKey((k) => k + 1);                 // 部屋の見比べデータを再取得
        const minSpin = new Promise((r) => setTimeout(r, 650)); // 最低限スピンを見せる
        try {
          const u = await window.WC.Me.refresh();         // 自分の最新データを再取得
          if (u) setMe(window.WC.Me.withDraft(u));         // 未保存の下書きは温存
        } catch (e) { /* 失敗してもUIは維持 */ }
        await minSpin;
        setRefreshing(false);
      }

      // 「保存」成功時、KVが付けた最新の更新日時をローカルの me に取り込む。
      // commit() は戻り値を setMe しないため、表示用の updatedAt が古いままになるのを防ぐ。
      useEffect(() => window.WC.Me.onSaveState((s) => {
        if (s !== 'saved') return;
        const cu = window.WC.Me.cachedUser();
        if (cu && cu.updatedAt) setMe((prev) => ({ ...prev, updatedAt: cu.updatedAt }));
      }), []);

      const pred = me.pred || window.WC.emptyPred();
      const member = { id: me.id, name: me.name, c: T.accent, initial: Array.from(me.name)[0] || '?' };

      // 編集はローカル下書きへ即時保存（KVは「保存」ボタン＝commit時のみ）
      function persist(nextPred) { setMe({ ...me, pred: nextPred }); window.WC.Me.saveDraft(nextPred); }
      function setPick(f, v) { persist({ ...pred, [f]: v }); }
      function setGroupRank(k, arr) { persist({ ...pred, groupRank: { ...(pred.groupRank || {}), [k]: arr } }); }
      function setThirdGroups(arr) { persist({ ...pred, thirdGroups: arr }); }
      function setKnockout(w) { persist({ ...pred, knockout: w }); }
      function goTab(id) { setOptScreen(null); setTab(id); }

      // 既存 screens は state.members/preds を参照するため単一メンバーのシムを渡す
      const soloState = { current: me.id, members: [member], preds: { [me.id]: pred } };

      const TABS = [
        { id: 'summary', label: 'ホーム', icon: 'trophy' },
        { id: 'input',   label: '予想',   icon: 'edit' },
        { id: 'rooms',   label: '部屋',   icon: 'people' },
        { id: 'group',   label: '大会結果', icon: 'grid' },
        { id: 'account', label: 'アカウント', icon: 'user' },
      ];

      const contentAvail = Math.max(360, contW - (isDesktop ? 256 : 0) - 72);

      function renderScreen(wide) {
        if (tab === 'summary') return <HomeScreen T={T} wide={wide} />;
        if (tab === 'input') {
          if (optScreen === 'grouprank') return <GroupRankScreen T={T} member={member} pred={pred}
            setGroupRank={setGroupRank} goBack={() => setOptScreen(null)} wide={wide} />;
          if (optScreen === 'thirdwild') return <ThirdWildScreen T={T} member={member} pred={pred}
            setThirdGroups={setThirdGroups} goBack={() => setOptScreen(null)} wide={wide} />;
          if (optScreen === 'knockout') return <KnockoutScreen T={T} member={member} pred={pred}
            setKnockout={setKnockout} goBack={() => setOptScreen(null)} wide={wide} availWidth={contentAvail} />;
          return <InputScreen solo T={T} state={soloState} member={member} pred={pred} setPick={setPick}
            goOption={setOptScreen} wide={wide} updatedAt={me.updatedAt} />;
        }
        if (tab === 'rooms') {
          if (roomView) return <RoomCompareScreen T={T} me={me} room={roomView}
            goBack={() => setRoomView(null)} wide={wide} availWidth={contentAvail} refreshKey={roomRefreshKey} />;
          return <RoomsScreen T={T} me={me} setMe={setMe} onOpenRoom={openRoom} wide={wide} siteKey={siteKey} />;
        }
        if (tab === 'group') return <GroupScreen T={T} wide={wide} />;
        if (tab === 'account') return <AccountScreen T={T} me={me} setMe={setMe} onSignOut={onSignOut} siteKey={siteKey} />;
        return null;
      }

      const wrapMax = tab === 'input' ? 700 : 1120;

      // ----- デスクトップ shell -----
      const desktopShell = (
        <div style={{ display: 'flex', height: '100%', background: T.bg, position: 'relative', overflow: 'hidden' }}>
          <div style={{ position: 'absolute', inset: 0, background: T.grad, pointerEvents: 'none' }} />
          <window.Sidebar solo T={T} t={t} tab={tab} setTab={goTab} tabs={TABS} members={[]}
            showWordmark={t.showWordmark} />
          <div style={{ flex: 1, minWidth: 0, display: 'flex', position: 'relative', zIndex: 1 }}>
            <div style={{ flex: 1, minWidth: 0, overflowY: 'auto' }}>
              <div key={tab + (optScreen || '') + (roomView ? roomView.id : '')}
                style={{ maxWidth: wrapMax, margin: '0 auto', padding: '30px 36px 40px',
                  animation: 'wcPop .34s cubic-bezier(.22,1,.36,1) both' }}>
                {renderScreen(true)}
              </div>
            </div>
          </div>
        </div>
      );

      // ----- モバイル/タブレット shell -----
      const mobileShell = (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: T.bg, position: 'relative' }}>
          <div style={{ position: 'absolute', inset: 0, background: T.grad, pointerEvents: 'none' }} />

          {/* ヘッダー */}
          <div style={{ flexShrink: 0,
            paddingTop: `calc(env(safe-area-inset-top, 0px) + ${mode === 'tablet' ? 22 : 18}px)`,
            position: 'relative', zIndex: 2 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '0 16px 12px', maxWidth: 620, margin: '0 auto' }}>
              {t.showWordmark ? (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ width: 30, height: 30, borderRadius: 9, background: T.accent,
                    display: 'grid', placeItems: 'center' }}>
                    <Icon name="trophy" size={18} color={T.accentInk} />
                  </div>
                  <div style={{ lineHeight: 1 }}>
                    <div style={{ fontFamily: "'Anton', 'Archivo', sans-serif", fontWeight: 400, fontSize: 17,
                      color: T.text, letterSpacing: 0.7 }}>WORLD CUP 2026</div>
                    <div style={{ fontSize: 10.5, color: T.faint, fontWeight: 700, marginTop: 1 }}>予想</div>
                  </div>
                </div>
              ) : <div />}
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <button onClick={doRefresh} disabled={refreshing} title="更新" style={{
                  border: 'none', background: T.card, width: 34, height: 34, borderRadius: '50%',
                  display: 'grid', placeItems: 'center', cursor: refreshing ? 'default' : 'pointer',
                  boxShadow: `inset 0 0 0 1px ${T.line}` }}>
                  <span style={{ display: 'grid', placeItems: 'center',
                    animation: refreshing ? 'wcSpin 0.7s linear infinite' : 'none' }}>
                    <Icon name="refresh" size={16} color={refreshing ? T.accent : T.sub} />
                  </span>
                </button>
                <button onClick={() => goTab('account')} title="アカウント" style={{
                  border: 'none', background: 'transparent', padding: 0, cursor: 'pointer',
                  display: 'grid', placeItems: 'center' }}>
                  <Avatar m={member} size={34} active={tab === 'account'} T={T} />
                </button>
              </div>
            </div>
          </div>

          {/* 画面 */}
          <div data-scroll="main" key={tab + (optScreen || '') + (roomView ? roomView.id : '')}
            style={{ flex: 1, overflow: 'auto', position: 'relative', zIndex: 1, paddingTop: 4 }}>
            <div style={{ maxWidth: 620, margin: '0 auto',
              animation: 'wcPop .34s cubic-bezier(.22,1,.36,1) both' }}>{renderScreen(false)}</div>
          </div>

          {/* タブバー */}
          <div style={{ flexShrink: 0, position: 'relative', zIndex: 2, display: 'flex',
            padding: '4px 6px calc(env(safe-area-inset-bottom, 0px) + 6px)',
            background: t.theme === 'classic' ? 'rgba(255,255,255,0.82)' : 'rgba(10,14,12,0.55)',
            backdropFilter: 'blur(18px) saturate(180%)', WebkitBackdropFilter: 'blur(18px) saturate(180%)',
            boxShadow: `0 -0.5px 0 ${T.line}` }}>
            <div style={{ display: 'flex', flex: 1, maxWidth: 620, margin: '0 auto', width: '100%' }}>
              {TABS.map(tb => {
                const active = tab === tb.id;
                return (
                  <button key={tb.id} onClick={() => goTab(tb.id)} style={{
                    flex: 1, border: 'none', background: 'transparent', cursor: 'pointer',
                    display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, padding: '2px 2px' }}>
                    <Icon name={tb.icon} size={20} color={active ? T.accent : T.faint} fill="none" sw={active ? 2.2 : 1.8} />
                    <span style={{ fontSize: 9, fontWeight: active ? 800 : 600,
                      color: active ? T.accent : T.faint, whiteSpace: 'nowrap' }}>{tb.label}</span>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );

      return isDesktop ? desktopShell : mobileShell;
    }

    // 招待リンク(?join=CODE)を読み取り、URLからは除去して返す（初回のみ）
    function readPendingJoin() {
      try {
        const params = new URLSearchParams(location.search);
        const raw = (params.get('join') || '').replace(/[^A-Za-z0-9]/g, '').toUpperCase();
        if (raw) {
          params.delete('join');
          const qs = params.toString();
          history.replaceState(null, '', location.pathname + (qs ? '?' + qs : '') + location.hash);
        }
        return raw || null;
      } catch (e) { return null; }
    }

    // 招待リンクで開いた相手に参加を促すモーダル
    function JoinInviteModal({ T, code, onJoin, onDismiss }) {
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState('');
      const fmt = (c) => (c || '').replace(/(.{4})(?=.)/g, '$1-');
      async function go() {
        if (busy) return;
        setBusy(true); setErr('');
        try { await onJoin(code); }
        catch (e) {
          setErr(e && e.status === 404 ? 'コードに該当する部屋がありません' : (e && e.message) || '参加に失敗しました');
          setBusy(false);
        }
      }
      return (
        <div style={{ position: 'fixed', inset: 0, zIndex: 1300, background: 'rgba(0,0,0,0.55)',
          display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
          <div style={{ width: '100%', maxWidth: 380, background: T.bg, borderRadius: 20,
            padding: '22px 20px', boxShadow: '0 20px 60px rgba(0,0,0,0.5)' }}>
            <div style={{ width: 44, height: 44, borderRadius: 13, background: `${T.accent}1F`,
              display: 'grid', placeItems: 'center', marginBottom: 14 }}>
              <Icon name="people" size={24} color={T.accent} />
            </div>
            <div style={{ fontWeight: 800, color: T.text, fontSize: 18 }}>部屋に招待されています</div>
            <p style={{ color: T.sub, fontSize: 13.5, lineHeight: 1.6, margin: '8px 0 4px' }}>
              招待コード <b style={{ color: T.text, fontFamily: 'Archivo, monospace', letterSpacing: 1 }}>{fmt(code)}</b> の部屋に参加しますか？</p>
            {err && <p style={{ color: '#FF6B6B', fontSize: 13, fontWeight: 700, margin: '8px 0 0' }}>{err}</p>}
            <div style={{ display: 'flex', gap: 8, marginTop: 18 }}>
              <button onClick={onDismiss} disabled={busy} style={{
                flex: 1, border: 'none', borderRadius: 13, padding: '13px', fontFamily: 'inherit',
                fontWeight: 800, fontSize: 14.5, cursor: 'pointer', background: T.panel2, color: T.sub }}>あとで</button>
              <button onClick={go} disabled={busy} style={{
                flex: 1.4, border: 'none', borderRadius: 13, padding: '13px', fontFamily: 'inherit',
                fontWeight: 800, fontSize: 14.5, cursor: busy ? 'default' : 'pointer',
                background: T.accent, color: T.accentInk }}>{busy ? '参加中…' : '参加する'}</button>
            </div>
          </div>
        </div>
      );
    }

    // ================= ルート（identity ゲート） =================
    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const T = useTheme(t);
      // localStorage に identity が無くても、まず cookie 復元(restore)を試すため 'restoring' から始める。
      const [route, setRoute] = useState(() => window.WC.Me.load() ? 'home' : 'restoring');
      const [me, setMe] = useState(() => window.WC.Me.withDraft(window.WC.Me.cachedUser()));
      const [homeTab, setHomeTab] = useState('summary');
      const [homeKey, setHomeKey] = useState(0);          // 参加後に Home を再マウントして部屋を開く
      const [pendingJoin, setPendingJoin] = useState(readPendingJoin); // 招待リンクの参加コード
      const [siteKey, setSiteKey] = useState(() => window.WC.TURNSTILE_SITE_KEY || null); // Turnstile（bot対策）
      const [, setConfigLoaded] = useState(false); // fetchConfig 完了で再レンダリングを保証（SCHEDULE/TEAM 反映）
      const updateAvailable = useAppUpdate(); // 新デプロイ検知 → 更新バナー

      // 招待リンク → 参加 → 自動で部屋を開く
      async function handleJoinInvite(code) {
        const out = await window.WC.Rooms.join(me.id, code);
        const rooms = Array.isArray(me.rooms) ? me.rooms : [];
        const nextRooms = rooms.some((r) => r && r.id === out.room.id)
          ? rooms : [...rooms, { id: out.room.id, code: out.room.code, name: out.room.name }];
        const nextMe = { ...me, rooms: nextRooms };
        setMe(nextMe); window.WC.Me.cacheUser(nextMe);
        try { localStorage.setItem('wc2026_last_room_v1', out.room.id); } catch (e) {}
        setHomeTab('rooms'); setHomeKey((k) => k + 1); setPendingJoin(null);
      }

      useEffect(() => {
        // チーム/結果/名簿の共有設定を取得。完了後 Turnstile サイトキーを反映。
        window.WC.fetchConfig().then(() => { setSiteKey(window.WC.TURNSTILE_SITE_KEY || null); setConfigLoaded(true); });
        if (window.WC.Me.load()) {
          window.WC.Me.refresh().then((u) => {
            if (u) { setMe(window.WC.Me.withDraft(u)); setRoute('home'); }  // 下書きを温存
            else { setMe(null); setRoute('onboarding'); }  // 失効/未登録
          });
        } else {
          // localStorage に identity が無い → cookie からサーバー復元を試す（iOS Safari ITP 対策）。
          window.WC.Me.restore().then((u) => {
            if (u) { setMe(window.WC.Me.withDraft(u)); setRoute('home'); }  // cookie から自動ログイン
            else { setMe(null); setRoute('onboarding'); }  // cookie 無し/失効 → 新規登録
          });
        }
      }, []);

      // レスポンシブ判定（コンテナ幅基準）
      const appRef = useRef(null);
      const measured = window.useContainerWidth(appRef);
      const previewW = t.preview === 'mobile' ? 402 : t.preview === 'tablet' ? 834
        : t.preview === 'desktop' ? 1280 : 0;
      const contW = previewW || measured || 1200;
      const mode = window.modeFor(contW);
      const isDesktop = mode === 'desktop';

      let inner;
      if (route === 'onboarding') {
        inner = <Onboarding T={T} siteKey={siteKey} onDone={(u, tab) => { setMe(window.WC.Me.withDraft(u)); setHomeTab(tab || 'summary'); setRoute('home'); }} />;
      } else if (route === 'restoring' || !me) {
        inner = <Splash T={T} />;
      } else {
        inner = <Home key={homeKey} T={T} t={t} setTweak={setTweak} me={me} setMe={setMe}
          isDesktop={isDesktop} contW={contW} mode={mode} initialTab={homeTab} siteKey={siteKey}
          onSignOut={() => { window.WC.Me.clear(); setMe(null); setRoute('onboarding'); }} />;
      }

      // 外側：プレビュー枠処理
      const isDevicePreview = previewW > 0 && previewW < 1100;
      const colStyle = previewW > 0
        ? { width: previewW, height: '100%', flexShrink: 0, position: 'relative', overflow: 'hidden',
            boxShadow: isDevicePreview ? '0 30px 80px rgba(0,0,0,0.45)' : 'none' }
        : { width: '100%', height: '100%', position: 'relative' };

      return (
        <div style={{ width: '100%', height: '100%', display: 'flex',
          justifyContent: 'center', alignItems: 'stretch',
          background: '#0b0d12', overflow: previewW > 0 ? 'auto' : 'hidden' }}>
          <div ref={appRef} id="wc-app-root" style={colStyle}>
            {inner}
            {updateAvailable && (
              <div onClick={() => window.location.reload()} style={{
                position: 'fixed', top: 0, left: 0, right: 0, zIndex: 2000,
                background: T.accent, color: T.accentInk, padding: '11px 16px',
                fontFamily: 'inherit', fontWeight: 800, fontSize: 13.5, cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                boxShadow: '0 2px 14px rgba(0,0,0,0.35)' }}>
                <Icon name="refresh" size={16} color={T.accentInk} sw={2.6} />
                新しいバージョンがあります — タップして更新
              </div>
            )}
            <window.SaveStatus T={T} />
            {route === 'home' && me && pendingJoin &&
              <JoinInviteModal T={T} code={pendingJoin}
                onJoin={handleJoinInvite} onDismiss={() => setPendingJoin(null)} />}
          </div>

          {/* ===== Tweaks ===== */}
          <TweaksPanel>
            <TweakSection label="表示プレビュー" />
            <TweakRadio label="画面サイズ" value={t.preview}
              options={[
                { value: 'auto', label: '自動' },
                { value: 'mobile', label: 'スマホ' },
                { value: 'tablet', label: 'タブレット' },
                { value: 'desktop', label: 'PC' },
              ]}
              onChange={v => setTweak('preview', v)} />
            <TweakSection label="見た目" />
            <TweakRadio label="テーマ" value={t.theme}
              options={[
                { value: 'pitch', label: 'ピッチ' },
                { value: 'classic', label: 'クラシック' },
                { value: 'bold', label: 'ボールド' },
              ]}
              onChange={v => { setTweak('theme', v); setTweak('accent', ''); }} />
            <TweakColor label="アクセント色" value={t.accent || (window.WC.THEMES[t.theme].accent)}
              options={ACCENTS[t.theme]}
              onChange={v => setTweak('accent', v)} />
            <TweakToggle label="ロゴ表示" value={t.showWordmark}
              onChange={v => setTweak('showWordmark', v)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
