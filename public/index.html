<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>W杯2026 予想 — 仲間内アプリ</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Zen Kaku Gothic New', -apple-system, system-ui, sans-serif;
    background: #0b0d12;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }
  #root { width: 100vw; height: 100vh; height: 100dvh; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(150,160,175,0.28); border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  * { scrollbar-width: thin; scrollbar-color: rgba(150,160,175,0.28) transparent; }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  @keyframes wcFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes wcSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes wcPop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="module">
    import { BRACKET_STRUCTURE, WILDCARD_SLOTS, PERMITTED, deriveKnockout } from './lib/bracket.js';
    import { SCORING, scoreMember } from './lib/scoring.js';
    window.WC = window.WC || {};
    Object.assign(window.WC, { BRACKET_STRUCTURE, WILDCARD_SLOTS, PERMITTED, deriveKnockout, SCORING });
    // 採点は RESULT を結果として渡す薄いラッパに統一（既存呼び出し scoreMember(pred) を維持）
    window.WC.scoreMember = (pred) => scoreMember(pred, window.WC.RESULT, SCORING);
  </script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="app-shell.jsx"></script>
  <script type="text/babel" src="screens-core.jsx"></script>
  <script type="text/babel" src="screens-bracket.jsx"></script>
  <script type="text/babel" src="screens-rank.jsx"></script>
  <script type="text/babel" src="screens-group.jsx"></script>
  <script type="text/babel" src="screens-grouprank.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "pitch",
      "accent": "#B6FF3C",
      "showWordmark": true,
      "dtLayout": "split",
      "preview": "auto"
    }/*EDITMODE-END*/;

    const ACCENTS = {
      pitch:   ['#B6FF3C', '#3CE0FF', '#FFD23D', '#FF6B6B'],
      classic: ['#1E50E6', '#0F9D58', '#E4572E', '#7A3FF2'],
      bold:    ['#FF3D8B', '#21E6C1', '#FFD23D', '#7C5Cff'],
    };

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [state, setState] = useState(() => window.WC.load());
      const [tab, setTab] = useState('summary');
      const [adding, setAdding] = useState(false);
      const [newName, setNewName] = useState('');
      const [, setCfgLoaded] = useState(0);
      useEffect(() => {
        let alive = true;
        window.WC.fetchConfig().then((ok) => { if (alive && ok) setCfgLoaded((n) => n + 1); });
        return () => { alive = false; };
      }, []);

      window.WC.MEMBERS = state.members;

      // テーマ合成
      const base = window.WC.THEMES[t.theme] || window.WC.THEMES.pitch;
      const T = { ...base };
      if (t.accent) { T.accent = t.accent;
        const hex = t.accent.replace('#','');
        const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
        T.accentInk = (r*0.299+g*0.587+b*0.114) > 150 ? '#0A1410' : '#ffffff';
      }

      const member = window.WC.MEMBERS.find(m => m.id === state.current) || state.members[0];
      const pred = state.preds[state.current];

      function persist(next) { setState(next); window.WC.save(next); }
      function setCurrent(id) { persist({ ...state, current: id }); }
      function commitAdd() {
        const next = window.WC.addMember(state, newName);
        setState(next); setNewName(''); setAdding(false); setTab('input');
      }
      function removeMember(id) { setState(window.WC.removeMember(state, id)); }
      function setPick(field, value) {
        persist({ ...state, preds: { ...state.preds, [state.current]: { ...pred, [field]: value } } });
      }
      function setBracket(winners) {
        persist({ ...state, preds: { ...state.preds, [state.current]: { ...pred, bracket: winners } } });
      }
      function doReset() { persist(window.WC.reset()); setTab('summary'); }

      // ---- レスポンシブ判定（コンテナ幅基準）----
      const appRef = useRef(null);
      const measured = window.useContainerWidth(appRef);
      const previewW = t.preview === 'mobile' ? 402 : t.preview === 'tablet' ? 834
        : t.preview === 'desktop' ? 1280 : 0;
      const contW = previewW || measured || 1200;
      const mode = window.modeFor(contW);
      const isDesktop = mode === 'desktop';

      const MOBILE_TABS = [
        { id: 'summary', label: 'ホーム', icon: 'trophy' },
        { id: 'input', label: '予想', icon: 'edit' },
        { id: 'group', label: 'グループ', icon: 'grid' },
        { id: 'rank', label: 'ランキング', icon: 'medal' },
      ];
      const DESKTOP_TABS = [
        { id: 'summary', label: 'ホーム', icon: 'trophy' },
        { id: 'input', label: '予想を入力', icon: 'edit' },
        { id: 'group', label: 'グループ', icon: 'grid' },
        { id: 'compare', label: '見比べ', icon: 'people' },
        { id: 'rank', label: 'ランキング', icon: 'medal' },
      ];

      // 右レールの表示可否＆ブラケットの利用可能幅
      const railShown = isDesktop && t.dtLayout === 'split' && contW >= 1180
        && (tab === 'summary' || tab === 'input');
      const contentAvail = Math.max(360, contW - 256 - (railShown ? 300 : 0) - 72);
      const narrowTab = tab === 'input';
      const wrapMax = narrowTab ? 700 : 1120;

      function renderScreen(wide) {
        if (tab === 'summary') return <SummaryScreen T={T} state={state} member={member} pred={pred}
          goTab={setTab} wide={wide} dashboard={wide && t.dtLayout === 'dashboard'} />;
        if (tab === 'input') return <InputScreen T={T} member={member} pred={pred} setPick={setPick}
          onRemove={removeMember} canRemove={state.members.length > 1} wide={wide} />;
        if (tab === 'group') return <GroupScreen T={T} wide={wide} />;
        if (tab === 'compare') return <CompareScreen T={T} state={state} goTab={setTab} wide={wide} />;
        if (tab === 'rank') return <RankingScreen T={T} state={state} wide={wide} />;
        return null;
      }

      const showSwitcher = tab === 'summary' || tab === 'input';

      // ================= デスクトップ shell =================
      const desktopShell = (
        <div style={{ display: 'flex', height: '100%', background: T.bg, position: 'relative',
          overflow: 'hidden' }}>
          <div style={{ position: 'absolute', inset: 0, background: T.grad, pointerEvents: 'none' }} />
          <window.Sidebar T={T} t={t} tab={tab} setTab={setTab} tabs={DESKTOP_TABS}
            members={state.members} current={state.current} setCurrent={setCurrent}
            onAdd={() => { setNewName(''); setAdding(true); }} onReset={doReset}
            showWordmark={t.showWordmark} />
          <div style={{ flex: 1, minWidth: 0, display: 'flex', position: 'relative', zIndex: 1 }}>
            <div style={{ flex: 1, minWidth: 0, overflowY: 'auto' }}>
              <div key={tab} style={{ maxWidth: wrapMax, margin: '0 auto', padding: '30px 36px 40px' }}>
                {renderScreen(true)}
              </div>
            </div>
            {railShown && <window.RightRail T={T} state={state} member={member} pred={pred} goTab={setTab} />}
          </div>
        </div>
      );

      // ================= モバイル/タブレット shell =================
      const mobileShell = (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column',
          background: T.bg, position: 'relative' }}>
          <div style={{ position: 'absolute', inset: 0, background: T.grad, pointerEvents: 'none' }} />

          {/* ヘッダー */}
          <div style={{ flexShrink: 0,
            paddingTop: `calc(env(safe-area-inset-top, 0px) + ${mode === 'tablet' ? 22 : 18}px)`,
            position: 'relative', zIndex: 2 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '0 16px', maxWidth: 620, margin: '0 auto' }}>
              {t.showWordmark ? (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ width: 30, height: 30, borderRadius: 9, background: T.accent,
                    display: 'grid', placeItems: 'center' }}>
                    <Icon name="trophy" size={18} color={T.accentInk} />
                  </div>
                  <div style={{ lineHeight: 1 }}>
                    <div style={{ fontFamily: 'Archivo', fontWeight: 900, fontSize: 15,
                      color: T.text, letterSpacing: 0.3 }}>WORLD CUP 2026</div>
                    <div style={{ fontSize: 10.5, color: T.faint, fontWeight: 700, marginTop: 1 }}>仲間内 予想バトル</div>
                  </div>
                </div>
              ) : <div />}
              <button onClick={doReset} title="サンプルに戻す" style={{
                border: 'none', background: T.card, width: 34, height: 34, borderRadius: '50%',
                display: 'grid', placeItems: 'center', cursor: 'pointer',
                boxShadow: `inset 0 0 0 1px ${T.line}` }}>
                <Icon name="refresh" size={17} color={T.sub} />
              </button>
            </div>

            {showSwitcher && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '12px 16px 10px',
                maxWidth: 620, margin: '0 auto' }}>
                <div style={{ display: 'flex', gap: 7, overflowX: 'auto', flex: 1, minWidth: 0 }}>
                  {state.members.map(m => {
                    const active = m.id === state.current;
                    return (
                      <button key={m.id} onClick={() => setCurrent(m.id)} style={{
                        display: 'flex', alignItems: 'center', gap: 7, flexShrink: 0,
                        border: 'none', cursor: 'pointer', borderRadius: 999,
                        padding: active ? '5px 13px 5px 5px' : '5px',
                        background: active ? T.card : 'transparent',
                        boxShadow: active ? `inset 0 0 0 1px ${m.c}66` : 'none', transition: '.18s' }}>
                        <Avatar m={m} size={28} T={T} />
                        {active && <span style={{ fontWeight: 800, fontSize: 13.5, color: T.text }}>{m.name}</span>}
                      </button>
                    );
                  })}
                </div>
                <button onClick={() => { setNewName(''); setAdding(true); }} title="参加者を追加" style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                  width: 38, height: 38, borderRadius: '50%', cursor: 'pointer',
                  border: 'none', background: T.card, boxShadow: `inset 0 0 0 1.5px ${T.line}` }}>
                  <Icon name="plus" size={20} color={T.sub} sw={2.4} />
                </button>
              </div>
            )}
          </div>

          {/* 画面 */}
          <div key={tab} style={{ flex: 1, overflow: 'auto', position: 'relative', zIndex: 1,
            paddingTop: showSwitcher ? 4 : 12 }}>
            <div style={{ maxWidth: 620, margin: '0 auto' }}>{renderScreen(false)}</div>
          </div>

          {/* タブバー */}
          <div style={{ flexShrink: 0, position: 'relative', zIndex: 2, display: 'flex',
            padding: '8px 6px calc(env(safe-area-inset-bottom, 0px) + 14px)',
            background: t.theme === 'classic' ? 'rgba(255,255,255,0.82)' : 'rgba(10,14,12,0.55)',
            backdropFilter: 'blur(18px) saturate(180%)', WebkitBackdropFilter: 'blur(18px) saturate(180%)',
            boxShadow: `0 -0.5px 0 ${T.line}` }}>
            <div style={{ display: 'flex', flex: 1, maxWidth: 620, margin: '0 auto', width: '100%' }}>
              {MOBILE_TABS.map(tb => {
                const active = tab === tb.id;
                return (
                  <button key={tb.id} onClick={() => setTab(tb.id)} style={{
                    flex: 1, border: 'none', background: 'transparent', cursor: 'pointer',
                    display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, padding: '4px 2px' }}>
                    <Icon name={tb.icon} size={23} color={active ? T.accent : T.faint} fill="none" sw={active ? 2.2 : 1.8} />
                    <span style={{ fontSize: 9.5, fontWeight: active ? 800 : 600,
                      color: active ? T.accent : T.faint, whiteSpace: 'nowrap' }}>{tb.label}</span>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );

      // ---- 外側：プレビュー枠処理 ----
      const isDevicePreview = previewW > 0 && previewW < 1100;
      const colStyle = previewW > 0
        ? { width: previewW, height: '100%', flexShrink: 0, position: 'relative',
            overflow: 'hidden',
            boxShadow: isDevicePreview ? '0 30px 80px rgba(0,0,0,0.45)' : 'none' }
        : { width: '100%', height: '100%', position: 'relative' };

      return (
        <div style={{ width: '100%', height: '100%', display: 'flex',
          justifyContent: 'center', alignItems: 'stretch',
          background: '#0b0d12', overflow: previewW > 0 ? 'auto' : 'hidden' }}>
          <div ref={appRef} style={colStyle}>
            {isDesktop ? desktopShell : mobileShell}

            {/* 参加者を追加（共通） */}
            <Sheet open={adding} onClose={() => setAdding(false)} T={T} title="参加者を追加" centered={isDesktop}>
              <div style={{ padding: '4px 18px 16px' }}>
                <input autoFocus value={newName} maxLength={12}
                  onChange={e => setNewName(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && newName.trim()) commitAdd(); }}
                  placeholder="名前を入力（例：たけし）"
                  style={{ width: '100%', border: 'none', outline: 'none', boxSizing: 'border-box',
                    background: T.panel2, color: T.text, fontSize: 17, fontFamily: 'inherit',
                    fontWeight: 700, padding: '14px 16px', borderRadius: 14,
                    boxShadow: `inset 0 0 0 1px ${T.line}` }} />
                <p style={{ color: T.faint, fontSize: 12, margin: '10px 2px 0', lineHeight: 1.5 }}>
                  追加した人は空の状態から予想を入力できます。</p>
                <button onClick={commitAdd} disabled={!newName.trim()} style={{
                  marginTop: 16, width: '100%', border: 'none', borderRadius: 14, padding: '14px',
                  fontFamily: 'inherit', fontWeight: 800, fontSize: 16,
                  cursor: newName.trim() ? 'pointer' : 'default',
                  background: newName.trim() ? T.accent : T.card,
                  color: newName.trim() ? T.accentInk : T.faint,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                  <Icon name="plus" size={18} color={newName.trim() ? T.accentInk : T.faint} sw={2.6} />
                  追加する
                </button>
              </div>
            </Sheet>
          </div>

          {/* ===== Tweaks ===== */}
          <TweaksPanel>
            <TweakSection label="表示プレビュー" />
            <TweakRadio label="画面サイズ" value={t.preview}
              options={[
                { value: 'auto', label: '自動' },
                { value: 'mobile', label: 'スマホ' },
                { value: 'tablet', label: 'タブレット' },
                { value: 'desktop', label: 'PC' },
              ]}
              onChange={v => setTweak('preview', v)} />
            <TweakRadio label="PCレイアウト" value={t.dtLayout}
              options={[
                { value: 'focused', label: '集中' },
                { value: 'split', label: 'スプリット' },
                { value: 'dashboard', label: 'ダッシュ' },
              ]}
              onChange={v => setTweak('dtLayout', v)} />
            <TweakSection label="見た目" />
            <TweakRadio label="テーマ" value={t.theme}
              options={[
                { value: 'pitch', label: 'ピッチ' },
                { value: 'classic', label: 'クラシック' },
                { value: 'bold', label: 'ボールド' },
              ]}
              onChange={v => { setTweak('theme', v); setTweak('accent', ''); }} />
            <TweakColor label="アクセント色" value={t.accent || (window.WC.THEMES[t.theme].accent)}
              options={ACCENTS[t.theme]}
              onChange={v => setTweak('accent', v)} />
            <TweakToggle label="ロゴ表示" value={t.showWordmark}
              onChange={v => setTweak('showWordmark', v)} />
            <TweakSection label="データ" />
            <TweakButton label="サンプル予想に戻す" onClick={doReset} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
