name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # GitHub が push トリガーを取りこぼした時などに、main へ手動で本番デプロイを再起動できる。
  # 手動実行(workflow_dispatch)は event_name が pull_request でないため Deploy 先は 'main'(本番)に解決される。
  workflow_dispatch:

# 同一ブランチの古い実行は新しい push でキャンセルする
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # 外部依存ゼロ（node 標準テストランナーのみ）。node 21+ が glob を自前展開する
      - name: Test
        run: npm test

      # デプロイ識別子(git SHA)を version.json と index.html に焼き込む。
      # クライアントは起動/復帰時に version.json と照合し、差異があれば更新バナーを出す。
      - name: Stamp build version
        run: |
          printf '{ "version": "%s" }\n' "$GITHUB_SHA" > public/version.json
          sed -i "s/__BUILD_VERSION__/${GITHUB_SHA}/g" public/index.html

      # main への push は本番（--branch=main）、PR はプレビュー（--branch=pr-<番号>）。
      # 注意: wrangler-action の command 入力はシェル変数を展開しないため、以前の
      # "$DEPLOY_BRANCH" はリテラル文字列のまま wrangler に渡り、production ブランチ(main)と
      # 一致せず全デプロイが Preview 扱いになっていた（＝本番に反映されない原因）。
      # ブランチ名を直接展開するとコマンドインジェクションの恐れがあるため、Actions 式で
      # 安全な固定値('main')か数値由来の値('pr-<番号>')のみを生成して渡す。
      - name: Deploy
        # サプライチェーン対策でSHAピン留め（タグは移動可能なため）。更新時はSHAを確認すること
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy public --project-name=wcup2026-yosou
            --branch=${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'main' }}
